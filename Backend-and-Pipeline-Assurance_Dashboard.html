<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Backend & Pipeline Assurance Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f0f2ff; --surface: #ffffff; --border: #dde1f0; --text: #1a1d2e;
      --muted: #6b7280; --label: #2d3250; --accent: #4f46e5; --green: #059669;
      --amber: #d97706; --red: #dc2626; --radius: 12px; --font: 'Plus Jakarta Sans', sans-serif;
    }
    body { font-family: var(--font); background: var(--bg); color: var(--text); padding: 30px; font-size: 14px; }
    .container { max-width: 1200px; margin: 0 auto; }
    header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    h1 { font-size: 24px; font-weight: 700; }
    .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 24px; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; text-align: center; }
    .stat-label { font-size: 11px; text-transform: uppercase; color: var(--muted); font-weight: 700; }
    .stat-value { font-size: 32px; font-weight: 700; margin-top: 4px; }
    .table-container { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; text-align: left; }
    th, td { padding: 14px 18px; border-bottom: 1px solid var(--border); }
    th { background: #fafbff; font-weight: 600; color: var(--label); }
    .badge { padding: 4px 10px; border-radius: 100px; font-size: 12px; font-weight: 600; display: inline-block; }
    .badge.open { background: #e0f2fe; color: #0284c7; }
    .badge.progress { background: #fef3c7; color: #d97706; }
    .badge.closed { background: #d1fae5; color: #059669; }
    select { padding: 6px 10px; border-radius: 6px; border: 1px solid var(--border); font-family: var(--font); outline: none; background: #fff; cursor: pointer; }
    .file-link { color: var(--accent); text-decoration: none; font-weight: 600; }
    .file-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div>
        <h1>Operational Continuity Dashboard</h1>
        <p style="color: var(--muted);">Live task pipeline monitors</p>
      </div>
    </header>

    <div class="stats-grid">
      <div class="stat-card" style="border-top: 4px solid var(--accent);">
        <div class="stat-label">Total Requests</div>
        <div class="stat-value" id="count-total">0</div>
      </div>
      <div class="stat-card" style="border-top: 4px solid var(--amber);">
        <div class="stat-label">Open Issues</div>
        <div class="stat-value" id="count-open">0</div>
      </div>
      <div class="stat-card" style="border-top: 4px solid var(--green);">
        <div class="stat-label">Completed Tasks</div>
        <div class="stat-value" id="count-closed">0</div>
      </div>
    </div>

    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Requester</th>
            <th>System</th>
            <th>Priority</th>
            <th>Needed By</th>
            <th>Status</th>
            <th>Attachment</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="table-body">
          <tr>
            <td colspan="8" style="text-align: center; color: var(--muted); padding: 40px;">Syncing data stream pipelines...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <script>
    const WEB_APP_URL = 'https://script.google.com/macros/s/YOUR_NEW_DEPLOYMENT_ID/exec';

    async function loadDashboardData() {
      try {
        const res = await fetch(WEB_APP_URL);
        const data = await res.json();
        renderTable(data);
      } catch (err) {
        console.error("Dashboard ingestion pipeline error:", err);
        document.getElementById('table-body').innerHTML = `<tr><td colspan="8" style="text-align: center; color: var(--red); padding: 40px;">Failed to load data. Ensure script is deployed correctly.</td></tr>`;
      }
    }

    function renderTable(rows) {
      const tbody = document.getElementById('table-body');
      tbody.innerHTML = '';

      if (rows.length === 0) {
        tbody.innerHTML = `<tr><td colspan="8" style="text-align: center; color: var(--muted); padding: 40px;">No current active operations entries logged.</td></tr>`;
        return;
      }

      let openCount = 0, closedCount = 0;

      rows.forEach(row => {
        if(row.status === 'Open') openCount++;
        if(row.status === 'Completed' || row.status === 'Closed') closedCount++;

        let statusClass = 'open';
        if(row.status === 'In Progress') statusClass = 'progress';
        if(row.status === 'Completed' || row.status === 'Closed') statusClass = 'closed';

        const fileCell = row.attachments ? `<a href="${row.attachments}" target="_blank" class="file-link">📁 View File</a>` : `<span style="color:var(--muted)">None</span>`;

        tbody.innerHTML += `
          <tr>
            <td><b>#${row.rowId}</b></td>
            <td>${row.name}<br><span style="font-size:11px; color:var(--muted)">${row.department}</span></td>
            <td>${row.system}<br><span style="font-size:11px; color:var(--muted)">${row.requestType}</span></td>
            <td><span style="font-weight:600;">${row.priority}</span></td>
            <td>${row.neededBy || 'N/A'}</td>
            <td><span class="badge ${statusClass}">${row.status}</span></td>
            <td>${fileCell}</td>
            <td>
              <select onchange="updateRowStatus(${row.rowId}, this.value)">
                <option value="">Update Status...</option>
                <option value="Open">Open</option>
                <option value="In Progress">In Progress</option>
                <option value="Completed">Completed</option>
              </select>
            </td>
          </tr>`;
      });

      document.getElementById('count-total').innerText = rows.length;
      document.getElementById('count-open').innerText = openCount;
      document.getElementById('count-closed').innerText = closedCount;
    }

    async function updateRowStatus(rowId, newStatus) {
      if(!newStatus) return;
      
      try {
        await fetch(WEB_APP_URL, {
          method: 'POST',
          body: JSON.stringify({ action: "updateStatus", rowId: rowId, status: newStatus })
        });
        alert(`Row #${rowId} updated to ${newStatus}`);
        loadDashboardData();
      } catch (err) {
        console.error(err);
        alert('Failed to update status.');
      }
    }

    // Run primary load sequence
    window.onload = loadDashboardData;
  </script>
</body>
</html>
