<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Submission Successful</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: #f0f2ff;
      color: #1a1d2e;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #ffffff;
      padding: 40px 32px;
      border-radius: 16px;
      border: 1px solid #dde1f0;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
      text-align: center;
      max-width: 440px;
      width: 100%;
    }
    .icon {
      font-size: 48px;
      margin-bottom: 16px;
      display: inline-block;
      animation: scaleUp 0.3s ease-out;
    }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
    p { color: #6b7280; font-size: 14px; line-height: 1.6; margin-bottom: 24px; }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.15s;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color: #fff;
      border: none;
      width: 100%;
    }
    .btn:hover { opacity: 0.95; transform: translateY(-1px); }
    @keyframes scaleUp {
      0% { transform: scale(0.6); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="icon">✅</div>
    <h1>Request Logged Successfully</h1>
    <p>Your request has been safely written back to the data matrix.</p>
    <!-- Update BPA-Form.html if your form page has a different filename -->
    <a href="BPA-Form.html" class="btn">🔄 Return to Form</a>
  </div>

</body>
</html>
