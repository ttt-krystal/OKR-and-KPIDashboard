<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Stuff Box</title>
    
    <!-- Clean, punchy modern fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #fdf6e2;             /* Cozy soft banana background */
            --border-main: #1e1e24;    /* Strong, cartoonish crisp outline */
            
            /* Fun Pop Accent Colors */
            --folder-yellow: #ffde6a;  
            --intake-pink: #ffb4d6;    
            --locked-blue: #a3e2f7;    
            --btn-green: #9bf6ff;      
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--border-main);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .workspace-cabinet {
            width: 100%;
            max-width: 580px;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        /* Fun Retro Header Box */
        header {
            background: #ffffff;
            border: 3px solid var(--border-main);
            padding: 24px;
            border-radius: 16px;
            box-shadow: 6px 6px 0px var(--border-main);
            margin-bottom: 40px;
            position: relative;
        }

        header h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2.2rem;
            margin: 0 0 6px 0;
            letter-spacing: -0.02em;
        }

        header p {
            margin: 0;
            font-size: 1rem;
            color: #555;
            font-weight: 500;
        }

        /* Interactive Sticker Badge */
        .sticker {
            position: absolute;
            top: -15px;
            right: -10px;
            background: #b5e2fa;
            border: 2px solid var(--border-main);
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 600;
            transform: rotate(6deg);
            cursor: pointer;
            user-select: none;
            transition: transform 0.1s ease;
        }
        .sticker:active {
            transform: scale(0.9) rotate(0deg);
        }

        .section-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.2rem;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* The File Grid Storage System */
        .storage-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 20px;
        }

        /* Fun Folder Item Component */
        .file-folder {
            text-decoration: none;
            color: var(--border-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 16px;
            background: #ffffff;
            border: 3px solid var(--border-main);
            border-radius: 16px;
            box-shadow: 4px 4px 0px var(--border-main);
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.2s ease;
            position: relative;
        }

        /* Bounce interaction when hovering folder */
        .file-folder:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 8px 8px 0px var(--border-main);
        }

        .file-folder:active {
            transform: translateY(2px);
            box-shadow: 2px 2px 0px var(--border-main);
        }

        /* Fun Dynamic Folder Tab visual graphic */
        .folder-visual {
            width: 70px;
            height: 50px;
            background-color: var(--folder-yellow);
            border: 3px solid var(--border-main);
            border-radius: 4px 12px 4px 4px;
            position: relative;
            margin-bottom: 14px;
            box-shadow: 2px 2px 0px rgba(0,0,0,0.1);
        }

        .folder-visual::before {
            content: '';
            position: absolute;
            top: -9px;
            left: -3px;
            width: 25px;
            height: 8px;
            background-color: var(--folder-yellow);
            border: 3px solid var(--border-main);
            border-bottom: none;
            border-radius: 6px 6px 0 0;
        }

        /* Tailoring the form tab color specifically */
        .form-folder .folder-visual, .form-folder .folder-visual::before {
            background-color: var(--intake-pink);
        }

        /* Label details */
        .file-folder h2 {
            font-size: 0.95rem;
            font-weight: 600;
            margin: 0 0 4px 0;
            line-height: 1.3;
        }

        .file-folder p {
            margin: 0;
            font-size: 0.75rem;
            color: #666;
        }

        /* Empty / Available Space Boxes */
        .file-folder.empty-slot {
            background: rgba(255, 255, 255, 0.3);
            border-style: dashed;
            box-shadow: none;
            cursor: dotted;
        }

        .file-folder.empty-slot:hover {
            transform: none;
            box-shadow: none;
        }

        .file-folder.empty-slot .folder-visual {
            background-color: transparent;
            border-style: dashed;
            opacity: 0.4;
        }
        .file-folder.empty-slot .folder-visual::before {
            display: none;
        }

        footer {
            text-align: center;
            margin-top: 50px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.85rem;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <div class="workspace-cabinet">
        <header>
            <!-- Interactive clickable sticker badge -->
            <div class="sticker" onclick="changeStickerText(this)">Click me! ✌️</div>
            <h1>Stuff Storage</h1>
            <p>My neat little stash of active custom tools and files.</p>
        </header>

        <div class="section-title">
            <span>🗂️</span> Cabinet Directory
        </div>

        <!-- File Cluster Grid -->
        <main class="storage-grid">
            
            <!-- THE OPERATIONAL CONTINUITY FORM FILE -->
            <!-- Link your actual HTML form file right here -->
            <a href="Backend-and-Pipeline-Assurance_Dashboard.html" class="file-folder form-folder">
                <div class="folder-visual"></div>
                <h2>Backend & Pipeline Assurance Dashboard</h2>
                <p>Dashboard Link</p>
            </a>

            <!-- EMPTY SLOT FOR NEXT THING -->
            <div class="file-folder empty-slot">
                <div class="folder-visual"></div>
                <h2>[ Empty Slot ]</h2>
                <p>Ready for project</p>
            </div>

            <!-- EMPTY SLOT FOR THIRD THING -->
            <div class="file-folder empty-slot">
                <div class="folder-visual"></div>
                <h2>[ Empty Slot ]</h2>
                <p>Ready for project</p>
            </div>

        </main>

        <footer>
            <p>Vault Vol. 1 // 2026 </p>
        </footer>
    </div>

    <script>
        // Fun tiny interaction for the sticker badge
        const phrases = ["Have a nice day! 🌟", "Keep creating! 🚀", "Fixed it! 🛠️", "Operational 🟢"];
        let currentIdx = 0;
        
        function changeStickerText(element) {
            element.textContent = phrases[currentIdx];
            currentIdx = (currentIdx + 1) % phrases.length;
        }
    </script>
</body>
</html>
